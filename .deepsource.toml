version = 1

test_patterns = [
    "tests/**",
    "**/*.test.ts",
    "**/*.spec.ts",
    "**/*.test.js",
    "**/*.spec.js"
]

exclude_patterns = [
    "node_modules/**",
    "build/**",
    "dist/**",
    ".svelte-kit/**"
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["browser", "node", "es6"]
  module_system = "es6"
